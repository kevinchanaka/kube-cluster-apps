global:
  domain: argocd.lab.kevinf.xyz

configs:
  params:
    create: true
    server.insecure: "true"

server:
  service:
    servicePortHttpsAppProtocol: kubernetes.io/h2c
  httproute:
    enabled: true
    parentRefs:
    - name: eg
      namespace: eg-system
      sectionName: argocd
    hostnames:
    - argocd.lab.kevinf.xyz
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - group: ""
        kind: Service
        name: argocd-server
        port: 80
        weight: 1
  grpcroute:
    enabled: true
    parentRefs:
    - name: eg
      namespace: eg-system
      sectionName: argocd-grpc
    hostnames:
    - grpc.argocd.lab.kevinf.xyz
    rules:
    - backendRefs:
      - group: ""
        kind: Service
        name: argocd-server
        port: 443
        weight: 1
  backendTLSPolicy:
    enabled: false
