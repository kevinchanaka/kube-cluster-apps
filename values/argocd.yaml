global:
  domain: argocd.lab.kevinf.xyz

configs:
  params:
    create: true
    server.insecure: "true"

# ArgoCD application controller performance optimisation if required
# controller:
#   extraArgs:
#   - --kubectl-parallelism-limit=3
#   - --operation-processors=3
#   - --status-processors=3
#   - --wq-bucket-qps=3
#   - --wq-bucket-size=30

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.lab.kevinf.xyz
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/service.serversscheme: https
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    tls: true
