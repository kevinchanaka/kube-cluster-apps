installCRDs: true

replicaCount: 1

serviceAccount:
  create: true
  name: external-secrets

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

logLevel: info

metrics:
  enabled: true

extraObjects:
- apiVersion: external-secrets.io/v1
  kind: ClusterSecretStore
  metadata:
    name: infisical
  spec:
    provider:
      infisical:
        hostAPI: https://app.infisical.com
        secretsScope:
          projectSlug: homelab
          environmentSlug: prod
        auth:
          universalAuthCredentials:
            clientId:
              name: infisical
              key: clientId
              namespace: external-secrets
            clientSecret:
              name: infisical
              key: clientSecret
              namespace: external-secrets
