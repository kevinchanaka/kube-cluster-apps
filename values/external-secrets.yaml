installCRDs: true

replicaCount: 1

serviceAccount:
  create: true
  name: external-secrets

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

logLevel: info

metrics:
  enabled: true

extraObjects:
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: kubernetes-eso
    namespace: kube-system
- apiVersion: rbac.authorization.k8s.io/v1
  kind: Role
  metadata:
    name: kubernetes-eso
    namespace: kube-system
  rules:
  - apiGroups: [""]
    resources:
    - secrets
    verbs:
    - get
    - list
    - watch
  - apiGroups:
    - authorization.k8s.io
    resources:
    - selfsubjectrulesreviews
    verbs:
    - create
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: kubernetes-eso
    namespace: kube-system
  subjects:
  - kind: ServiceAccount
    name: kubernetes-eso
    namespace: kube-system
  roleRef:
    kind: Role
    name: kubernetes-eso
    apiGroup: rbac.authorization.k8s.io
- apiVersion: external-secrets.io/v1
  kind: ClusterSecretStore
  metadata:
    name: kubernetes-eso
  spec:
    provider:
      kubernetes:
        remoteNamespace: kube-system
        server:
          url: https://kubernetes.default
          caProvider:
            type: ConfigMap
            name: kube-root-ca.crt
            namespace: kube-system
            key: ca.crt
        auth:
          serviceAccount:
            name: kubernetes-eso
            namespace: kube-system
