apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: ghcr.io/argoproj/argo-helm
    chart: argo-cd
    targetRevision: "9.4.*"
    helm:
      releaseName: argocd
      valueFiles:
      - $repo/values/argocd.yaml
  - repoURL: https://github.com/kevinchanaka/kube-cluster-apps.git
    targetRevision: HEAD
    ref: repo
  syncPolicy:
    syncOptions:
    - ServerSideApply=true
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc

---

