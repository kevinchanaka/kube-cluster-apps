apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: manifests/config
    repoURL: https://github.com/kevinchanaka/kube-cluster-apps.git
    targetRevision: HEAD
    directory:
      include: "*"
