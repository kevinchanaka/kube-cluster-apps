apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-external-dns-token
  namespace: default
spec:
  secretStoreRef:
    name: kubernetes-eso
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: app-secrets
        property: CLOUDFLARE_API_TOKEN
